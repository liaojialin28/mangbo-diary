version: '3.8'

services:
  wx-oauth:
    image: ghcr.io/liaojialin28/mangbo-diary:latest
    container_name: wx-oauth-login
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      # 通过环境变量覆盖 yml 中的默认配置
      - WX_APP_ID=${WX_APP_ID:-your_app_id_here}
      - WX_APP_SECRET=${WX_APP_SECRET:-your_app_secret_here}
