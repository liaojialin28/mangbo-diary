name: 微信OAuth服务自动部署到CentOS云服务器

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # 1. 拉取仓库代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 配置JDK11 Maven缓存
      - name: 设置 JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: "maven"

      # 3. Maven 编译打包跳过测试
      - name: 编译打包
        run: mvn -B clean package -DskipTests

      # 4. SSH连通性预检
      - name: SSH 连通性预检
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 60s
          script: |
            set -e
            echo "whoami: $(whoami)"
            echo "hostname: $(hostname)"
            docker --version

      # 5. 远端清理旧容器、旧jar包
      - name: 远端清理旧jar
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          port: 22
          script: |

            CONTAINER_NAME="wx-oauth-login"
            JAR_PATH="/tmp/wx-oauth-login.jar"

            echo "========== 开始诊断和清理 =========="

            # --- 诊断：检查文件状态 ---
            if [ -e "$JAR_PATH" ] || [ -L "$JAR_PATH" ]; then
              echo ">>> 发现残留目标，详细信息:"
              ls -la "$JAR_PATH"
              file "$JAR_PATH"
              # 检查是否有 immutable 属性 (chattr)
              lsattr "$JAR_PATH" 2>/dev/null || echo "lsattr 不可用"
              # 检查是否有进程占用该文件/目录
              lsof "$JAR_PATH" 2>/dev/null || echo "lsof 无结果"
              docker ps --filter "name=$CONTAINER_NAME" --format "{{.ID}} {{.Names}} {{.Status}}"
            else
              echo ">>> 目标位置干净，无需清理"
              exit 0
            fi

            # --- 步骤1: 强制停止并移除所有相关容器 ---
            echo ""
            echo ">>> 步骤1: 移除 Docker 容器..."
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            sleep 2
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
            sleep 2
            echo "容器处理完成"

            # 再次检查是否还有进程占用
            lsof "$JAR_PATH" 2>/dev/null && echo "警告: 仍有进程占用!" || echo "无进程占用"

            # --- 步骤2: 尝试普通删除 ---
            echo ""
            echo ">>> 步骤2: 尝试普通删除..."
            rm -rf "$JAR_PATH" 2>/dev/null && { echo "普通删除成功"; exit 0; }

            # --- 步骤3: 尝试解除 immutable 属性再删 ---
            echo "普通删除失败，尝试解除 immutable 属性..."
            sudo chattr -i "$JAR_PATH" 2>/dev/null || chattr -i "$JAR_PATH" 2>/dev/null || echo "chattr 不可用或无权限"
            rm -rf "$JAR_PATH" 2>/dev/null && { echo "解除 immutable 后删除成功"; exit 0; }

            # --- 步骤4: 使用 sudo 删除 ---
            echo ""
            echo ">>> 步骤4: 尝试 sudo 删除..."
            sudo rm -rf "$JAR_PATH" 2>/dev/null && { echo "sudo 删除成功"; exit 0; }

            # --- 全部失败：输出详细诊断并退出 ---
            echo ""
            echo "============================================="
            echo "ERROR: 所有删除方式均失败！请手动排查:"
            echo "============================================="
            echo "文件信息:"
            ls -laZ "$JAR_PATH" 2>/dev/null   # 包含 SELinux 上下文
            stat "$JAR_PATH"
            echo ""
            echo "请在服务器上手动执行以下命令排查:"
            echo "  1. ls -la /tmp/wx-oauth-login.jar"
            echo "  2. lsattr /tmp/wx-oauth-login.jar"
            echo "  3. lsof /tmp/wx-oauth-login.jar"
            echo "  4. getenforce  (查看 SELinux 状态)"
            echo "  手动解决后重新部署即可。"
            exit 1

      # 6. SCP上传jar
      - name: 传输 JAR 到 CentOS /tmp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          port: 22
          timeout: 120s
          source: "target/wx-oauth-login.jar"
          target: "/tmp/"
          overwrite: true
          strip_components: 1

      # 7. 启动容器
      - name: 在 CentOS 上重启服务
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 10m
          script: |
            set -e

            JAR_PATH="/tmp/wx-oauth-login.jar"
            CONTAINER_NAME="wx-oauth-login"
            NETWORK_NAME="app-net"

            test -f "$JAR_PATH"
            ls -lh "$JAR_PATH"
            sha256sum "$JAR_PATH"

            # 容错删除旧容器
            docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true

            # 使用自定义网络（替代 --link）
            docker network create "$NETWORK_NAME" >/dev/null 2>&1 || true

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart=always \
              --network "$NETWORK_NAME" \
              -e TZ=Asia/Shanghai \
              -p 8082:8080 \
              -v "$JAR_PATH:/app.jar:ro" \
              -e WX_APP_ID='${{ secrets.WX_APP_ID }}' \
              -e WX_APP_SECRET='${{ secrets.WX_APP_SECRET }}' \
              openjdk:11-jdk \
              java -jar /app.jar

            docker ps --filter "name=$CONTAINER_NAME"
