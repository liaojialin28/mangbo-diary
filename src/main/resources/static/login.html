<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微信公众号登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .logo-area {
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #07c160;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .logo-text { color: #333; font-size: 18px; font-weight: 600; }
        .btn-group { display: flex; flex-direction: column; gap: 14px; }
        .btn-wx {
            display: block;
            padding: 13px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-silent {
            background: #f7f7f7;
            color: #576b95;
            border: 1px solid #e5e5e5;
        }
        .btn-silent:hover { background: #efefef; }
        .btn-auth {
            background: #07c160;
            color: #fff;
            border: none;
        }
        .btn-auth:hover { background: #06ad56; }
        .user-info { display: none; }
        .user-info.show { display: block; }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #07c160;
            margin-bottom: 16px;
            background: #f0f0f0;
        }
        .avatar-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e0e0e0;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 28px;
        }
        .nickname { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 6px; }
        .openid { font-size: 12px; color: #999; word-break: break-all; margin-bottom: 8px; }
        .login-tip { font-size: 13px; color: #07c160; }
        .hidden { display: none !important; }
        .alert-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .alert-overlay.show { display: flex; }
        .alert-box {
            background: #fff;
            border-radius: 12px;
            padding: 24px 20px;
            width: 80%;
            max-width: 280px;
            text-align: center;
        }
        .alert-title { font-size: 17px; font-weight: 600; color: #333; margin-bottom: 10px; }
        .alert-msg { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 20px; }
        .alert-btn {
            display: inline-block;
            background: #07c160;
            color: #fff;
            padding: 10px 32px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo-area">
            <div class="logo-icon">微</div>
            <div class="logo-text">微信账号登录</div>
        </div>

        <div id="btnGroup" class="btn-group">
            <!-- 静默登录，跳转后端授权入口，携带scope -->
            <a id="btnSilent" href="/api/wx/login?scope=snsapi_base" class="btn-wx btn-silent">静默自动登录</a>
            <!-- 显式授权登录 -->
            <a id="btnAuth" href="/api/wx/login?scope=snsapi_userinfo" class="btn-wx btn-auth">授权登录</a>
        </div>

        <div id="userInfo" class="user-info">
            <div id="avatarArea"></div>
            <div id="nicknameDisplay" class="nickname"></div>
            <div id="openidDisplay" class="openid"></div>
            <div class="login-tip">✓ 登录成功</div>
        </div>
    </div>
</div>

<div id="alertOverlay" class="alert-overlay">
    <div class="alert-box">
        <div id="alertTitle" class="alert-title">提示</div>
        <div id="alertMsg" class="alert-msg"></div>
        <button class="alert-btn" onclick="hideAlert()">确定</button>
    </div>
</div>

<script>
    (function() {
        // 后端登录成功后跳转回当前页面地址
        const PAGE_URL = "https://mangbo.xyz/gzhwy_backend/wx-oauth-login/static/login.html";

        // 工具：获取url参数
        function getUrlParam(name) {
            const reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
            const r = window.location.search.substr(1).match(reg);
            return r ? decodeURIComponent(r[2]) : null;
        }

        function showAlert(msg) {
            document.getElementById('alertMsg').textContent = msg;
            document.getElementById('alertOverlay').classList.add('show');
        }
        window.hideAlert = function() {
            document.getElementById('alertOverlay').classList.remove('show');
        }

        // 判断微信环境
        function isWechatBrowser() {
            const ua = navigator.userAgent.toLowerCase();
            return ua.indexOf('micromessenger') !== -1;
        }

        // 渲染登录成功用户信息
        function renderUserInfo(token, openid, nickname, headimgurl) {
            document.getElementById('btnGroup').classList.add('hidden');
            const avatarArea = document.getElementById('avatarArea');
            if (headimgurl) {
                avatarArea.innerHTML = `<img src="${headimgurl}" alt="头像" class="avatar">`;
            } else {
                avatarArea.innerHTML = `<div class="avatar-placeholder">?</div>`;
            }
            document.getElementById('nicknameDisplay').textContent = nickname || "微信用户";
            document.getElementById('openidDisplay').textContent = "ID: " + openid.substring(0,12) + "...";
            localStorage.setItem("wx_login_token", token);
            localStorage.setItem("wx_openid", openid);
            document.getElementById('userInfo').classList.add('show');
        }

        function init() {
            // 非微信浏览器提示
            if (!isWechatBrowser()) {
                showAlert("请在微信客户端内打开此页面");
                return;
            }

            // 获取后端回调带回的token、错误信息
            const token = getUrlParam("token");
            const openid = getUrlParam("openid");
            const nickname = getUrlParam("nickname");
            const headimgurl = getUrlParam("headimgurl");
            const err = getUrlParam("err");

            // 授权失败弹窗
            if (err) {
                showAlert(err);
                return;
            }

            // 登录成功，展示用户信息
            if (token && openid) {
                renderUserInfo(token, openid, nickname, headimgurl);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
</body>
</html>
