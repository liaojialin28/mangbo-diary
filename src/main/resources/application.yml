# 服务器配置
server:
  port: 8080

# 微信公众号 OAuth 配置（禁止硬编码，必须从 yml 读取）
wx:
  oauth:
    # 公众号 AppID - 请替换为实际的 AppID
    app-id: ${WX_APP_ID:123123}
    # 公众号 AppSecret - 请替换为实际的 AppSecret
    app-secret: ${WX_APP_SECRET:123213}
    # 微信回调后端接口（redirect_uri）
    redirectUrl: https://mangbo.xyz/api/wx/callback
    # 登录成功跳转的静态登录页面
    successPage: https://mangbo.xyz/gzhwy_backend/wx-oauth-login/static/login.html

